<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC: Cálculo de Índice de Massa Corporal</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div>
        <section class="container">
            <div class="conteudo">
                <h1>Tabela IMC</h1>
                
                <table>
                    <tr>
                        <th>IMC</th>
                        <th>Resultado</th>
                    </tr>
                    <tr>
                        <td>Menos do que 18,5</td>
                        <td>Abaixo do peso</td>
                    </tr>
                    <tr>
                        <td>Entre 18,5 e 24,9</td>
                        <td>Peso normal</td>
                    </tr>
                    <tr>
                        <td>Entre 25 e 29,9</td>
                        <td>Sobrepeso</td>
                    </tr>
                    <tr>
                        <td>Entre 30 e 34,9</td>
                        <td>Obesidade grau 1</td>
                    </tr>
                    <tr>
                        <td>Entre 35 e 39,9</td>
                        <td>Obesidade grau 2</td>
                    </tr>
                    <tr>
                        <td>Mais do que 40</td>
                        <td>Obesidade grau 3</td>
                    </tr>
                </table>

                <h2>Calcule seu IMC</h2>

            </div>

            <div class="formulario">
                <form action="" method="post" id="formulario">
                    <label for="input-peso">Peso:</label>
                    <input type="number" id="input-peso" class="input-texto" placeholder="Digite seu peso: (ex: 70)">

                    <label for="input-altura">Altura:</label>
                    <input type="number" id="input-altura" class="input-texto" step="0.01" placeholder="Digite sua altura: (ex: 1.75)">

                    <button id="botao-calcular">Calcular</button>
                </form>
            </div>

            <div id="resultado"></div>
        </section>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
